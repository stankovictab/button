app: Skype
icon: skype
tags: ["Communication"]
default: true
groups:
    - category: General
      shortcuts:
        - desc: View keyboard shortcuts
          keys: [Ctrl, Slash]
          macos: [Cmd, Slash]
        - desc: Open settings
          keys: [Ctrl, Comma]
          macos: [Cmd, Comma]
        - desc: Start new conversation
          keys: [Ctrl, n]
          macos: [Cmd, n]
        - desc: Search contacts, messages, and bots
          keys: [Ctrl, Shift, s]
          macos: [Cmd, Alt, f]
        - desc: Search within current conversation
          keys: [Ctrl, f]
          macos: [Cmd, f]
        - desc: Send a file
          keys: [Ctrl, Shift, f]
          macos: [Cmd, Shift, f]
    - category: Calls
      shortcuts:
        - desc: Toggle mute
          keys: [Ctrl, m]
          macos: [Cmd, Shift, m]
        - desc: Hang up
          keys: [Ctrl, Shift, h]
          macos: [Cmd, Shift, h]
