app: WordPress
icon: wordpress
tags: ["CMS", "Writing", "Web App"]
default: true
groups:
    - category: Editor
      shortcuts:
        - desc: Show keyboard shortcuts
          keys: [Shift, Alt, h]
          macos: [Ctrl, Alt, h]
        - desc: Toggle fullscreen mode
          keys: [Ctrl, Shift, Alt, f]
          macos: [Cmd, Shift, Alt, f]
        - desc: Open block list view
          keys: [Shift, Alt, o]
          macos: [Ctrl, Alt, o]
        - desc: Show or hide settings sidebar
          keys: [Ctrl, Shift, Comma]
          macos: [Cmd, Shift, Comma]
        - desc: Save changes
          keys: [Ctrl, s]
          macos: [Cmd, s]
        - desc: Duplicate selected block
          keys: [Ctrl, Shift, d]
          macos: [Cmd, Shift, d]
