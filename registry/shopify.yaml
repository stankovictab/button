app: Shopify
icon: shopify
tags: ["E-commerce", "Web App"]
default: true
groups:
    - category: Admin
      shortcuts:
        - desc: Show keyboard shortcuts
          keys: ["?"]
          macos: ["?"]
        - desc: Close shortcuts dialog
          keys: [Esc]
          macos: [Esc]
        - desc: Add product
          keys: ["A then P"]
          macos: ["A then P"]
        - desc: Add customer
          keys: ["A then C"]
          macos: ["A then C"]
        - desc: Add discount
          keys: ["A then D"]
          macos: ["A then D"]
