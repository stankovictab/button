app: SoundCloud
icon: soundcloud
tags: ["Media", "Music", "Web App"]
default: true
groups:
    - category: Playback
      shortcuts:
        - desc: Play or pause
          keys: [Space]
          macos: [Space]
        - desc: Next track
          keys: [Shift, ArrowRight]
          macos: [Shift, ArrowRight]
        - desc: Previous track
          keys: [Shift, ArrowLeft]
          macos: [Shift, ArrowLeft]
        - desc: Volume up
          keys: [Shift, ArrowUp]
          macos: [Shift, ArrowUp]
        - desc: Volume down
          keys: [Shift, ArrowDown]
          macos: [Shift, ArrowDown]
        - desc: Mute
          keys: [m]
          macos: [m]
        - desc: Repeat track
          keys: [Shift, l]
          macos: [Shift, l]
