app: Mission Control / Spaces
icon: missioncontrol
tags: ["System UI", "Window Management", "macOS"]
default: true
groups:
    - category: Navigation
      shortcuts:
        - desc: Enter or leave Mission Control
          macos: [Ctrl, ArrowUp]
        - desc: Show App Expose
          macos: [Ctrl, ArrowDown]
        - desc: Switch to next Space
          macos: [Ctrl, ArrowRight]
        - desc: Switch to previous Space
          macos: [Ctrl, ArrowLeft]
        - desc: Show Desktop
          macos: [Cmd, F3]
