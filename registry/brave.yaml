app: Brave
icon: brave
tags: ["Browser"]
default: true
groups:
    - category: Tabs & Windows
      shortcuts:
        - desc: New tab
          keys: [Ctrl, t]
          macos: [Cmd, t]
        - desc: New private window
          keys: [Ctrl, Shift, n]
          macos: [Cmd, Shift, n]
        - desc: Reopen last closed tab
          keys: [Ctrl, Shift, t]
          macos: [Cmd, Shift, t]
        - desc: Next tab
          keys: [Ctrl, Tab]
          macos: [Ctrl, Fn, ArrowDown]
        - desc: Previous tab
          keys: [Ctrl, Shift, Tab]
          macos: [Ctrl, Fn, ArrowUp]
    - category: General
      shortcuts:
        - desc: Focus address bar
          keys: [Ctrl, l]
          macos: [Cmd, l]
        - desc: Find in page
          keys: [Ctrl, f]
          macos: [Cmd, f]
        - desc: Open Brave Task Manager
          keys: [Shift, Esc]
