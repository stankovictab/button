app: Apple Mail
icon: applemail
tags: ["Email", "macOS"]
default: true
groups:
    - category: Mail
      shortcuts:
        - desc: New message
          macos: [Cmd, n]
        - desc: Send message
          macos: [Cmd, Shift, d]
