app: Dropbox
icon: dropbox
tags: ["Cloud Storage", "Web App"]
default: true
groups:
    - category: Files
      shortcuts:
        - desc: Show keyboard shortcuts
          keys: ["?"]
          macos: ["?"]
        - desc: Search files and folders
          keys: [Slash]
          macos: [Slash]
        - desc: Move through files and folders
          keys:
            - [ArrowUp]
            - [ArrowDown]
          macos:
            - [ArrowUp]
            - [ArrowDown]
        - desc: Open selected file or folder
          keys: [Enter]
          macos: [Enter]
