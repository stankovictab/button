app: 1Password
icon: 1password
tags: ["Security", "Passwords"]
default: true
groups:
    - category: Global
      shortcuts:
        - desc: Show Quick Access
          keys: [Ctrl, Shift, Space]
          macos: [Cmd, Shift, Space]
        - desc: Lock 1Password
          keys: [Ctrl, Shift, l]
          macos: [Cmd, Shift, l]
        - desc: Fill in browser
          keys: [Ctrl, Backslash]
          macos: [Cmd, Backslash]
    - category: App
      shortcuts:
        - desc: View keyboard shortcuts
          keys: [Ctrl, Shift, Slash]
          macos: [Cmd, Slash]
        - desc: Open settings
          keys: [Ctrl, Comma]
          macos: [Cmd, Comma]
        - desc: Search items
          keys: [Ctrl, f]
          macos: [Cmd, f]
