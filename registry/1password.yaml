app: 1Password
icon: 1password
tags: [ "Security", "Passwords" ]
default: true
groups:
  - category: App
    shortcuts:
      - desc: View Keyboard Shortcuts
        keys: [ Ctrl, Shift, Slash ]
        macos: [ Cmd, Slash ]
      - desc: Show Quick Access
        keys: [ Ctrl, Shift, Space ]
        macos: [ Cmd, Shift, Space ]
      - desc: Lock 1Password
        keys: [ Ctrl, Shift, l ]
        macos: [ Cmd, Shift, l ]
  - category: Navigation
    shortcuts:
      - desc: Find
        keys: [ Ctrl, f ]
        macos: [ Option, Cmd, f ]
      - desc: Switch to All Accounts
        keys: [ Ctrl, "1" ]
        macos: [ Cmd, "1" ]
      - desc: Switch Accounts & Collections
        keys: [ Ctrl, "2-9" ]
        macos: [ Cmd, "2-9" ]
      - desc: Back
        keys: [ Alt, Left ]
        macos: [ Cmd, LeftBracket ]
      - desc: Forward
        keys: [ Alt, Right ]
        macos: [ Cmd, RightBracket ]
      - desc: Focus Next Row
        keys: [ Down ]
      - desc: Focus Previous Row
        keys: [ Up ]
      - desc: Focus Right Section
        keys: [ Right ]
      - desc: Focus Left Section
        keys: [ Left ]
  - category: Selected Item
    shortcuts:
      - desc: Copy Primary Field
        keys: [ Ctrl, c ]
        macos: [ Cmd, c ]
      - desc: Copy Password
        keys: [ Ctrl, Shift, c ]
        macos: [ Cmd, Shift, c ]
      - desc: Copy One-Time Password
        keys: [ Ctrl, Alt, c ]
        macos: [ Cmd, Option, c ]
      - desc: Open & Fill in Web Browser
        keys: [ Ctrl, Shift, f ]
        macos: [ Cmd, Shift, f ]
      - desc: Open Item in New Window
        keys: [ Ctrl, o ]
        macos: [ Cmd, o ]
      - desc: Edit Item
        keys: [ Ctrl, e ]
        macos: [ Cmd, e ]
      - desc: Save Item
        keys: [ Ctrl, s ]
        macos: [ Cmd, s ]
      - desc: Reveal Concealed Fields
        keys: [ Ctrl, r ]
        macos: [ Cmd, r ]
      - desc: Archive Item
        keys: [ Delete ]
      - desc: Delete Item
        keys: [ Ctrl, Delete ]
        macos: [ Cmd, Delete ]
  - category: View
    shortcuts:
      - desc: Show/Hide Sidebar
        keys: [ Ctrl, Shift, d ]
        macos: [ Cmd, Shift, d ]
      - desc: Zoom In
        keys: [ Ctrl, "+" ]
        macos: [ Cmd, Plus ]
      - desc: Zoom Out
        keys: [ Ctrl, "-" ]
        macos: [ Cmd, Minus ]
      - desc: Actual Size
        keys: [ Ctrl, "0" ]
        macos: [ Cmd, "0" ]
