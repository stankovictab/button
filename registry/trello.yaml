app: Trello
icon: trello
tags: ["Productivity", "Project Management", "Web App"]
default: true
groups:
    - category: Boards & Cards
      shortcuts:
        - desc: Search and open a board
          keys: [b]
          macos: [b]
        - desc: Open card filter
          keys: [f]
          macos: [f]
