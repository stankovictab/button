app: Netflix (web shortcuts)
icon: netflix
tags: ["Media", "Video", "Web App"]
default: true
groups:
    - category: Player
      shortcuts:
        - desc: Play or pause
          keys:
            - [Enter]
            - [Space]
          macos:
            - [Enter]
            - [Space]
        - desc: Toggle fullscreen
          keys: [f]
          macos: [f]
        - desc: Exit fullscreen
          keys: [Esc]
          macos: [Esc]
        - desc: Rewind 10 seconds
          keys: [ArrowLeft]
          macos: [ArrowLeft]
        - desc: Fast forward 10 seconds
          keys: [ArrowRight]
          macos: [ArrowRight]
        - desc: Volume up
          keys: [ArrowUp]
          macos: [ArrowUp]
        - desc: Volume down
          keys: [ArrowDown]
          macos: [ArrowDown]
        - desc: Mute
          keys: [m]
          macos: [m]
