app: File Explorer
icon: fileexplorer
tags: ["File Manager", "Windows"]
default: true
groups:
    - category: General
      shortcuts:
        - desc: Open File Explorer
          linux: [Win, e]
        - desc: Focus address bar
          linux: [Alt, d]
        - desc: Focus search box
          linux:
            - [Ctrl, e]
            - [Ctrl, f]
        - desc: Open new window
          linux: [Ctrl, n]
        - desc: Close window
          linux: [Ctrl, w]
        - desc: Show item properties
          linux: [Alt, Enter]
        - desc: Rename selected item
          linux: [F2]
