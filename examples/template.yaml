# ------------------------------------------------------------------------------
# button — app config template
# Place this file (or a copy of it) in: ~/.config/button/apps/
# File name becomes the lookup key; the "app" field is what's displayed.
# Supported extensions: .yaml / .yml
# ------------------------------------------------------------------------------

app: "My App" # Display name shown in the app list
icon:
  "myapp" # Lowercase key used to look up the icon (see iconMap.ts)
  # If no icon is found, initials are shown as a fallback.

# Optional category tags — shown as pills in the detail view.
# tags: [Productivity, Communication]

# Set to true for apps imported from the built-in registry.
# Automatically removed when the app is edited via the UI.
# default: true

groups:
  # A group is a named category of related shortcuts.
  - category: "General"
    shortcuts:
      # Basic shortcut — same keys on every platform.
      - desc: "Open settings"
        keys: [Ctrl, ","]

        # Platform-specific overrides.
        # Use "linux" and/or "macos" to override "keys" per platform.
        # "linux" applies to both Linux and Windows (they share the same binds).
        # If a platform key is omitted, "keys" is used as the fallback.
      - desc: "Quit"
        keys: [Ctrl, q] # fallback (Linux/Windows)
        macos: [Cmd, q] # override for macOS

        # Multiple alternative binds for one action.
        # Use an array of arrays — each inner array is one alternative.
      - desc: "Move up"
        keys:
          - [k]
          - [ArrowUp]

        # Multiple alternatives also work with platform overrides.
      - desc: "Search"
        keys:
          - [/]
          - [Ctrl, f]
        macos:
          - [/]
          - [Cmd, f]

  - category: "Editing"
    shortcuts:
      - desc: "Undo"
        keys: [Ctrl, z]
        macos: [Cmd, z]

      - desc: "Redo"
        keys: [Ctrl, Shift, z]
        macos: [Cmd, Shift, z]

        # A shortcut with no keys defined will show "Not set for <platform>".
      - desc: "Something Linux/Windows-only"
        linux: [Ctrl, Alt, t]
